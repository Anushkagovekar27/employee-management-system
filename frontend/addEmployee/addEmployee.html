<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Employee</title>

    <link rel="stylesheet" href="./addEmployee.css">
</head>

<body>

    <div class="container">

        <h1>Add Employee</h1>

        <form id="employeeForm">

            <input type="text" id="name" placeholder="Enter Name" required>

            <input type="email" id="email" placeholder="Enter Email" required>

            <input type="text" id="department" placeholder="Enter Department" required>

            <input type="number" id="salary" placeholder="Enter Salary" required>

            <button type="submit">
                Add Employee
            </button>

        </form>

    </div>

    <script src="./addEmployee.js"></script>

</body>

</html>

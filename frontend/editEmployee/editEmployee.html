<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Employee</title>

    <link rel="stylesheet" href="./editEmployee.css">
</head>

<body>

    <div class="container">

        <h1>Edit Employee</h1>

        <form id="editEmployeeForm">

            <input type="text" id="name" placeholder="Enter Name" required>

            <input type="email" id="email" placeholder="Enter Email" required>

            <input type="text" id="department" placeholder="Enter Department" required>

            <input type="number" id="salary" placeholder="Enter Salary" required>

            <button type="submit">
                Update Employee
            </button>

        </form>

    </div>

    <script src="./editEmployee.js"></script>

</body>

</html>
